name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Run e2e tests
        run: npm run test:e2e

  lint-check:
    name: Package sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      - run: npm ci
      - name: Check bin field and version format
        run: |
          node -e "
            const p = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            if (!p.bin || !p.bin.tvdev) throw new Error('bin.tvdev missing');
            if (!/^\d+\.\d+\.\d+/.test(p.version)) throw new Error('bad version: ' + p.version);
            console.log('OK: bin.tvdev =', p.bin.tvdev, '| version =', p.version);
          "
